[pytest]
; เทสต์จริงอยู่ใน tests/ เท่านั้น — root มี test_dcf.py ที่เป็นสคริปต์ demo
; (รันโค้ดตอน import) ถ้าไม่จำกัด testpaths จะทำ pytest collection ล่มทั้งชุด
testpaths = tests
; เทสต์ async (test_etf_analysis, test_screener) ต้องใช้ pytest-asyncio + โหมด auto
; ไม่มีบรรทัดนี้ pytest เปล่า ๆ จะ fail 2 ไฟล์ทั้งที่โค้ดปกติดี
asyncio_mode = auto
